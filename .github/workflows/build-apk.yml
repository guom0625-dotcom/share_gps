name: Build APK

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # gradle-wrapper.jar 없이 특정 버전 Gradle 직접 사용
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > client/app/keystore.jks

      - name: Build release APK
        working-directory: client
        env:
          KEYSTORE_PATH: keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
          VERSION_CODE:      ${{ github.run_number }}
          VERSION_NAME:      ${{ github.ref_name }}
          SERVER_URL:        https://guom0625.duckdns.org
        run: gradle :app:assembleRelease

      - name: Rename APK
        run: |
          TAG=${GITHUB_REF_NAME:-build-${{ github.run_number }}}
          mv client/app/build/outputs/apk/release/app-release.apk \
             client/app/build/outputs/apk/release/share-gps-${TAG}.apk

      - name: Upload artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ github.run_number }}
          path: client/app/build/outputs/apk/release/*.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: client/app/build/outputs/apk/release/*.apk
          generate_release_notes: true
